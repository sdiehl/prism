name: Release

# Cut a release by pushing a version tag (`git tag v0.4.0 && git push --tags`,
# or `just release 0.4.0`). This builds the Apple Silicon binary, attaches the
# tarball, checksum, and build provenance to a GitHub Release, and bumps the
# Homebrew tap. CI (ci.yml) only triggers on branch pushes, not tags, so this
# job runs its own full test gate.
#
# The binary is not self-contained: it links the z3 and zstd dylibs Homebrew's
# LLVM drags in, and shells out to clang to compile a program. Both come from
# `brew install llvm@22`, which the Homebrew formula declares as a dependency,
# so distribution is the bare binary plus that one documented dependency.
on:
  push:
    tags: ['v*']
  # Exercise the build/package path without cutting a tag (skips publish + tap).
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write      # create the release and upload assets
  id-token: write      # provenance attestation (OIDC)
  attestations: write  # provenance attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: macOS arm64 binary
    runs-on: macos-14  # Apple Silicon runner; host target is aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      # The tag must name the version the manifest will ship. Catches a stray
      # `git tag v0.5.0` while Cargo.toml still says 0.4.0 before anything builds.
      - name: Tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')"
          if [ "$tag" != "$manifest" ]; then
            echo "tag v$tag does not match Cargo.toml version $manifest"; exit 1
          fi
          echo "VERSION=$manifest" >> "$GITHUB_ENV"

      # On a manual dispatch (no tag) take the version straight from the manifest
      # so the package still names itself correctly.
      - name: Version from manifest (dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')"
          echo "VERSION=$manifest" >> "$GITHUB_ENV"

      # Toolchain version + components come from rust-toolchain.toml, so the
      # release builds with the same pinned rustc as CI.
      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # llvm@22 pins the major inkwell links against (llvm22-1); the bare `llvm`
      # formula would drift to 23+ and break the build. It also provides the z3
      # and zstd dylibs the built binary links and the clang it compiles with.
      - name: Install LLVM 22
        run: |
          brew install llvm@22
          prefix="$(brew --prefix llvm@22)"
          echo "LLVM_SYS_221_PREFIX=$prefix" >> "$GITHUB_ENV"
          echo "PRISM_CC=$prefix/bin/clang" >> "$GITHUB_ENV"

      # The release gate. ci.yml does not run on tags, so the parity/leak oracle
      # and the perf ratchet run here, on macOS, which is also the platform
      # coverage the Linux-only CI lacks.
      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

      - name: Package tarball
        run: |
          set -euo pipefail
          pkg="prism-${VERSION}-aarch64-apple-darwin"
          mkdir "$pkg"
          cp target/release/prism "$pkg/prism"
          cp LICENSE README.md "$pkg/" 2>/dev/null || true
          tar -czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" | tee "$pkg.tar.gz.sha256"
          echo "PKG=$pkg" >> "$GITHUB_ENV"

      # Smoke-test the packaged binary (not target/release/prism): compile and
      # run an example end to end, so a broken artifact fails here, not later.
      - name: Smoke test packaged binary
        run: |
          "./${PKG}/prism" examples/factorial.pr -o /tmp/factorial
          /tmp/factorial

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.PKG }}.tar.gz

      # The release body is the matching CHANGELOG.md section, so notes are
      # whatever was written for this version rather than auto-generated noise.
      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## +" v "([^0-9]|$)" { f=1; next }
            f && /^## / { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${VERSION}." > RELEASE_NOTES.md
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256

      # Bump Formula/prism.rb in the tap so `brew upgrade prism` sees the new
      # version. No-op until the tap repo and the HOMEBREW_TAP_TOKEN secret (a
      # PAT with contents:write on sdiehl/homebrew-prism) exist. See
      # packaging/homebrew/README.md for the one-time setup.
      - name: Check tap token
        id: tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump Homebrew formula
        if: steps.tap.outputs.enabled == 'true'
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: prism
          homebrew-tap: sdiehl/homebrew-prism
          download-url: https://github.com/sdiehl/prism/releases/download/v${{ env.VERSION }}/prism-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz
          commit-message: |
            prism {{version}}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
