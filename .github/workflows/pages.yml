name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Queue deploys; cancelling one mid-flight leaves a stuck deployment that blocks
  # all later ones. Matches GitHub's official Pages workflow.
  cancel-in-progress: false

jobs:
  # Build the site and upload it as the single `github-pages` artifact. Split from
  # the deploy below (GitHub's recommended two-job shape) because a single job that
  # both uploads and deploys leaves the prior attempt's artifact behind when the
  # run is re-run: `deploy-pages` then fails with "Multiple artifacts named
  # github-pages". With the upload confined to this job that `deploy` depends on,
  # each run resolves to exactly one artifact.
  build:
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      PRISM_CC: /usr/lib/llvm-22/bin/clang
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        run: rustup target add wasm32-unknown-unknown

      # The docs preprocessor (`prism mdbook`) live-checks every code block, so
      # the native binary (and thus LLVM) is built as part of the site.
      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y llvm-22-dev libpolly-22-dev clang-22 clang-tidy-22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # build-site.sh drives wasm-bindgen directly (cdylib via cargo rustc, since
      # Cargo.toml is rlib-only); the CLI version must match the wasm-bindgen crate.
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install mdbook + mdbook-tabs
        run: cargo install mdbook mdbook-tabs

      - uses: pnpm/action-setup@v6
        with:
          # Pinned to web/package.json's packageManager: a floating "11" once
          # pulled a just-published pnpm whose self-installer crashed.
          version: 11.6.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # One script builds the wasm once and stitches the docs (at /) and the
      # playground (at /play/) into a single site.
      - name: Build unified site
        run: docs/scripts/build-site.sh public

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  # Deploy the artifact the build job produced. Kept separate so a deploy re-run
  # never re-uploads, and the GitHub Pages environment/URL binds to exactly this
  # job. Needs nothing from the checkout: `deploy-pages` pulls the run's artifact.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
