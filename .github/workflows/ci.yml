name: CI

on:
  # Gated once per change: pull requests run the full parity/perf ratchet before
  # work lands, and pushes to main re-run it post-merge. Feature-branch pushes no
  # longer trigger their own run, so an open PR is no longer built twice.
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# A newer commit on the same ref supersedes an in-flight run, so rapid pushes do
# not pile up runners; the latest commit on each branch always gets a full run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # README install commands hardcode the version; fail if it drifts from Cargo.toml.
  readme-version:
    name: README version matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 scripts/check-readme-version.py

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      PRISM_CC: /usr/lib/llvm-22/bin/clang
      # Persist the native parity/leak verdicts across runs. Safe by
      # construction: each cached verdict is keyed by a hash of the compiler's
      # source tree (source fingerprint), so any change under src/, runtime/,
      # lib/, or the manifests re-runs the whole corpus and only genuinely
      # unchanged programs are skipped. A restored stale cache can never mask a
      # regression, its markers simply miss.
      PRISM_GATE_CACHE: "1"
      PRISM_GATE_FINGERPRINT: source
    steps:
      - uses: actions/checkout@v7

      # Toolchain version + components come from rust-toolchain.toml, so CI and
      # local fmt/clippy always run the identical rustc/rustfmt/clippy.
      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # The gate verdict cache, restored after rust-cache so its files are not
      # disturbed. A loose restore-key is correct because the marker's own key
      # carries the source/toolchain fingerprint; the per-sha save key just lets
      # each run publish an updated snapshot.
      - name: Cache gate verdicts
        uses: actions/cache@v4
        with:
          path: target/gate-cache
          key: gate-verdicts-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gate-verdicts-test-${{ runner.os }}-

      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm
        with:
          packages: clang-tidy-22

      # cargo-nextest runs every test binary's tests in one global scheduler, so
      # the many small suites fill cores continuously instead of queueing binary
      # after binary. It skips Rust doctests, which are run separately below.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      # rustdoc held to the same zero-warning bar as clippy and the C runtime:
      # a broken intra-doc link or a public doc pointing at a private item fails
      # CI rather than silently shipping degraded API docs.
      - name: Build docs (-D warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      # The C runtime is held to the same zero-warning bar as the Rust (clippy
      # -D warnings). A broad warning set under -Werror; -Wmissing-prototypes is
      # the one omission, since the prism_* functions are the runtime ABI called
      # from generated IR and have no header to declare them.
      - name: C runtime warnings (-Werror)
        run: |
          ${PRISM_CC:-clang} -std=c11 -O2 -Werror -Wall -Wextra -Wpedantic -Wshadow \
            -Wstrict-prototypes -Wconversion -Wsign-conversion -Wcast-qual -Wcast-align \
            -Wpointer-arith -Wwrite-strings -Wfloat-equal -Wundef -Wredundant-decls \
            -Wvla -Wdouble-promotion -Wformat=2 -fsyntax-only runtime/prism_rt.c

      # clang-tidy is the C analog of clippy: the checkset and its targeted
      # opt-outs live in runtime/.clang-tidy, with WarningsAsErrors so any new
      # finding fails CI. Path-sensitive memory safety is gated dynamically by
      # the ASan+UBSan parity run below; this is the static pass.
      - name: C runtime clang-tidy
        run: clang-tidy-22 runtime/prism_rt.c --quiet -- -std=c11 -O2

      # No stub markers slip into a release: a left-behind todo!/unimplemented!
      # would panic at runtime, and a broad allow(dead_code) hides real rot.
      - name: No stub markers
        run: |
          if grep -rEn 'todo!|unimplemented!|FIXME|XXX|allow\(dead_code\)' src bin; then
            echo "stub markers found (see above)"; exit 1
          fi

      # Runs the whole suite, including the runtime performance ratchet
      # (perf_gate.rs): evidence-passing/stream fusion must allocate zero
      # free-monad cells and FBIP reuse must fire at runtime, regressions parity
      # alone cannot see (identical output, zero leaks). The heavy native-parity
      # corpus is delegated to the sharded `parity` job below (PRISM_CORPUS_SHARDED),
      # so it is not also run serially here; the sanitizer re-runs still cover it.
      - name: Run tests
        env:
          PRISM_CORPUS_SHARDED: "1"
        run: cargo nextest run --workspace

      # nextest does not run Rust doctests (the `--test` in `-- | ... --test`
      # doc examples and rustdoc code blocks); cover them with a plain run.
      - name: Run doctests
        run: cargo test --doc

      # Re-run the native parity corpus with the C runtime built under ASan +
      # UBSan, so runtime undefined behavior (e.g. a signed left-shift on a
      # negative Int) and spatial/temporal memory bugs (heap overflow on a bignum
      # limb store, use-after-free of an rc'd cell, a stray kont frame) fail CI
      # instead of silently working at -O2. -fno-sanitize-recover makes the first
      # diagnostic abort the program, which fails the parity check. ASan's own
      # leak detection stays off: the runtime's deterministic PRISM_CHECK_LEAKS
      # cell-balance gate (asserted by parity.rs) owns that. Runs over the default
      # build, not --features mimalloc, whose malloc shim ASan cannot instrument.
      - name: ASan + UBSan runtime
        env:
          PRISM_CC_FLAGS: "-fsanitize=address,undefined -fno-sanitize-recover=all"
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1"
        run: cargo test --test parity native_matches_interpreter

      # Re-run the native parity corpus with the C runtime's in-binary structural
      # backstop (-DPRISM_RT_DEBUG): every cell dereference asserts a non-null,
      # aligned, positive-rc pointer with in-bounds field index, aborting on a
      # codegen tagging/rc bug instead of corrupting memory. Unlike ASan this
      # needs no instrumentation toolchain, so it is the net a shipped binary can
      # carry; here it must stay silent (a fired check fails parity).
      - name: Runtime structural backstop
        env:
          PRISM_CC_FLAGS: "-DPRISM_RT_DEBUG"
        run: cargo test --test parity native_matches_interpreter

      - name: Check prism formatting
        run: |
          cargo build --release 2>/dev/null
          ./target/release/prism fmt --check

      # The committed Standard Library Reference is generated from the stdlib
      # sources; fail if it drifts, and run the doctests in its `-- |` comments.
      - name: Check stdlib docs
        run: |
          ./target/release/prism docs --stdlib --check --out docs/src/stdlib
          ./target/release/prism docs --stdlib --test

      - name: Build release
        run: cargo build --all --release

      # PRISM_CORE_LINT runs Core Lint between every optimization pass, so the
      # whole example corpus is the lint's gate: a pass that produces ill-formed
      # Core (an escaped binder, a reuse token spent twice) aborts the compile.
      - name: Compile every example
        env:
          PRISM_CORE_LINT: 1
        run: |
          for f in examples/*.pr; do
            echo "== $f"
            ./target/release/prism "$f" -o /tmp/example_bin
          done

  web:
    name: Web playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm bundle
        run: wasm-pack build --target web --out-dir web/pkg --no-default-features --features wasm

      # The whole Prism compiler, gzipped, must still fit on a 1.44 MB floppy
      # disk. A real binary-size ratchet wearing a joke: if this ever fails,
      # Prism has outgrown 1998 and someone shipped a megabyte without noticing.
      - name: Fits on a floppy disk
        run: |
          FLOPPY=1474560  # bytes on a 3.5" HD floppy (1.44 "MB" = 1440 * 1024)
          GZ=$(gzip -9 -c web/pkg/prism_bg.wasm | wc -c | tr -d ' ')
          echo "gzipped wasm: $GZ B / floppy: $FLOPPY B"
          if [ "$GZ" -gt "$FLOPPY" ]; then
            echo "::error::Prism no longer fits on a floppy: gzipped wasm is $GZ B, a floppy holds $FLOPPY B ($((GZ - FLOPPY)) B over)."
            exit 1
          fi
          echo "Fits with $((FLOPPY - GZ)) B to spare. Eject safely."

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install, check, build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm build

  lean:
    name: Lean model
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
    steps:
      - uses: actions/checkout@v7

      # Toolchain pinned via rust-toolchain.toml (single source of truth).
      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # The `prism` binary links libLLVM (inkwell), so it needs the dev libs to
      # build even though the interpreter and `dump core-json` paths never touch
      # codegen. Same LLVM 22 install as the Test/MLIR jobs.
      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm

      # The differential oracle feeds the live compiler core through the verified
      # CEK model, so it needs the compiler built alongside the model.
      - name: Build prism
        run: cargo build

      # Kernel-checks every theorem in the core model (CEK adequacy, determinism,
      # progress, effect-safety) and the differential `Certificates` whose `rfl`
      # proofs pin model output to live `prism run` output, and builds the `oracle`
      # executable the differential harness runs. The toolchain is read from
      # models/lean-toolchain (single source of truth); no mathlib, so the build is
      # self-contained and fast. This is the one formal-methods gate that used to be
      # able to silently break (Lean was outside CI).
      - name: Build Lean model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: models
          build-args: --wfail

      # Runs the whole fixture corpus through both the verified CEK machine (via
      # `dump core-json` piped to the `oracle` exe) and `prism run`, and fails on
      # any divergence. This couples the proven model to the live compiler on every
      # push; before this it passed only when run by hand.
      - name: Differential oracle vs interpreter
        run: models/diff_against_rust.sh

      # The committed core-json certificate fixtures are a `just hash`-style
      # artifact: regenerate them and fail if they drift from what the compiler now
      # emits, so a stale certificate reference cannot ship.
      - name: Certificate fixtures drift check
        run: |
          models/gen_fixtures.sh
          git diff --exit-code -- models/fixtures/*.json \
            || { echo "models/fixtures/*.json drifted; run 'just fixtures' and commit"; exit 1; }

  mlir:
    name: MLIR backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Toolchain pinned via rust-toolchain.toml (single source of truth).
      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Same gate verdict cache as the Test job, on its own key so the two jobs
      # do not overwrite each other's snapshots. The `mlir` tag makes these
      # markers distinct from the LLVM ones even were the dirs ever shared.
      - name: Cache gate verdicts
        uses: actions/cache@v4
        with:
          path: target/gate-cache
          key: gate-verdicts-mlir-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gate-verdicts-mlir-${{ runner.os }}-

      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm
        with:
          packages: libmlir-22-dev mlir-22-tools

      - name: Build with mlir backend
        run: cargo build --features mlir
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
          MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
          TABLEGEN_220_PREFIX: /usr/lib/llvm-22

      - name: Run mlir parity test
        run: PATH=/usr/lib/llvm-22/bin:$PATH cargo test --features mlir --test parity
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
          MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
          TABLEGEN_220_PREFIX: /usr/lib/llvm-22
          PRISM_CC: /usr/lib/llvm-22/bin/clang
          PRISM_GATE_CACHE: "1"
          PRISM_GATE_FINGERPRINT: source

  # The heavy native-parity corpus, split across N shards that run in parallel so
  # wall-clock is corpus/N rather than the whole thing serially in the Test job
  # (which delegates it here via PRISM_CORPUS_SHARDED). Each shard runs the sorted
  # corpus's cases at positions (mod N) == shard; together they cover every case.
  parity:
    name: Native parity (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      PRISM_CC: /usr/lib/llvm-22/bin/clang
      PRISM_GATE_CACHE: "1"
      PRISM_GATE_FINGERPRINT: source
      PRISM_SHARD_TOTAL: "4"
      PRISM_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Per-shard gate-verdict cache: each shard owns a distinct key so the four
      # runs do not overwrite each other's snapshots.
      - name: Cache gate verdicts
        uses: actions/cache@v4
        with:
          path: target/gate-cache
          key: gate-verdicts-parity-${{ matrix.shard }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gate-verdicts-parity-${{ matrix.shard }}-${{ runner.os }}-

      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm

      - name: Native parity (shard ${{ matrix.shard }} of 4)
        run: cargo test --test parity native_matches_interpreter

  nix:
    name: Nix dev shell + package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Substitutes the LLVM/rust-overlay/package closure from Cachix and pushes
      # anything newly built. A cache miss or Cachix outage only makes this job
      # slower (falls back to cache.nixos.org + local build), never wrong.
      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: prism-lang
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Lock flake inputs
        run: nix flake lock

      - name: Build dev shell
        run: nix develop --command bash -c "rustc --version && clang --version && just --version"

      # Phase 2: the reproducible `prism` binary itself. Building it here keeps the
      # Nix build path from drifting from the cargo/setup-llvm path (loud failure on
      # any LLVM-version or source-filter skew) and seeds the package closure into
      # Cachix. The smoke asserts the artifact loads the embedded stdlib and runs.
      - name: Build package
        run: nix build .#default --print-build-logs

      - name: Smoke the built binary
        run: |
          ./result/bin/prism --version
          ./result/bin/prism check examples/accum.pr

      # Drift guard: the nix build path must embed the exact stdlib the cargo path
      # pins. Assert the nix-built binary's stdlib Merkle root equals the committed
      # golden that `just hash` regenerates from the cargo build (and that CI checks
      # elsewhere via `prism docs --stdlib --check`). A mismatch means the crane
      # source filter dropped/staled a stdlib source or the two paths' LLVM skewed.
      # The `.pr` file arg is an ignored placeholder; dump reads the embedded stdlib.
      - name: Stdlib Merkle root parity (nix vs committed golden)
        run: |
          set -euo pipefail
          golden="$(grep -oE '[0-9a-f]{64}' docs/src/stdlib/index.md | head -1)"
          got="$(./result/bin/prism dump stdlib-hash examples/accum.pr | awk '/^root/{print $2}')"
          echo "committed golden: $golden"
          echo "nix-built binary: $got"
          [ -n "$golden" ] || { echo "no golden root found in docs/src/stdlib/index.md"; exit 1; }
          [ "$golden" = "$got" ] || { echo "stdlib Merkle root drift between nix and cargo build paths"; exit 1; }

      # Keep the wasm bundle output building (interpreter-only, no LLVM); it feeds
      # the web/docs build and would otherwise bit-rot until someone ran it. Also
      # seeds the wasm closure into Cachix.
      - name: Build wasm bundle
        run: nix build .#wasm --print-build-logs

      # Uploaded even if the build step fails, so the resolved lockfile is always
      # retrievable from the run.
      - name: Upload flake.lock
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock
