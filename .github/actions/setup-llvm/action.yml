name: Setup LLVM 22
description: >
  Add the apt.llvm.org snapshot repo and install LLVM 22 (downloaded .deb
  archives cached so repeat runs skip the multi-minute download), plus the mold
  linker as the default. One definition shared by the compiling CI jobs.

inputs:
  packages:
    description: >
      Extra apt packages beyond the base set (llvm-22-dev, libpolly-22-dev,
      clang-22), space-separated. e.g. "clang-tidy-22" or "libmlir-22-dev
      mlir-22-tools".
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Add LLVM 22 apt repo
      shell: bash
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
          | sudo tee /etc/apt/sources.list.d/llvm.list
        # Refresh the index so the newly-added snapshot repo is known. Without
        # this the cache action's package-list normalization (apt-get --just-print
        # install) exits 100 "Unable to locate package" on a cache miss and aborts
        # with "Packages argument is empty".
        sudo apt-get update

    # Caches the resolved .deb set keyed by the package list, so the download
    # (the slow part) is skipped on a hit. Pinned to a version tag; pin to a
    # commit SHA to harden the supply chain further.
    - name: Install LLVM 22 (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: llvm-22-dev libpolly-22-dev clang-22 ${{ inputs.packages }}
        version: llvm22

    # mold is a far faster linker than ld; the compiler links libLLVM on every
    # build, so linking is a real chunk of wall-clock. make-default routes rustc's
    # cc linking through mold with no RUSTFLAGS, so it adds no sccache-key churn.
    # (Pinned to a tag like the action above; pin to a SHA to harden further.)
    - name: Install mold linker
      uses: rui314/setup-mold@v1
      with:
        make-default: true
