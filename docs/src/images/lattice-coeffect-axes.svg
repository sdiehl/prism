<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 670 716" role="img" aria-label="the six coeffect axes as mini-lattices: Allocation and Mobility as two-point chains, Fip meeting at {linear, bounded_stack}, and Multiplicity, Aliasing, and Escape as exclusive axes with no meet">
<title>the six coeffect axes as mini-lattices: Allocation and Mobility as two-point chains, Fip meeting at {linear, bounded_stack}, and Multiplicity, Aliasing, and Escape as exclusive axes with no meet</title>
<desc>A three-row by two-column grid of mini-lattices, one per usage axis, each titled with its axis name and a past or future caption. Allocation: (no claim) over noalloc, marked as the one checked fact today. Fip: (no claim) over linear and bounded_stack, which meet at {linear, bounded_stack}. Multiplicity: (no claim) over once and many, no meet. Aliasing: (no claim) over unique and aliased, no meet. Escape: (no claim) over local and noescape, no meet. Mobility: (no claim) over portable.</desc>
