<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 268" role="img" aria-label="the grade chain: many over once over never, a single vertical total order, paired with the keywords ctl, fun, and final ctl">
<title>the grade chain: many over once over never, a single vertical total order, paired with the keywords ctl, fun, and final ctl</title>
<desc>Three chips stacked vertically with upward accent arrows: many at the top, once in the middle, never at the bottom. Each is paired by a dotted tick to its keyword: many to ctl, once to fun, never to final ctl.</desc>
<line x1="104" y1="120" x2="104" y2="64" stroke="#2f9e63" stroke-width="1.25"/>
<path d="M 104 58 L 100 65 L 108 65 Z" fill="#2f9e63"/>
