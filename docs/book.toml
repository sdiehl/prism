[book]
title = "Prism"
authors = ["Stephen Diehl"]
description = "A small, modern, OCaml-class functional language with algebraic effects."
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
no-section-label = true
smart-punctuation = true
additional-css = ["theme/tabs.css", "theme/run.css"]
additional-js = ["theme/tabs.js", "theme/prism-highlight.js", "theme/prism-run.js"]
git-repository-url = "https://github.com/sdiehl/prism"
edit-url-template = "https://github.com/sdiehl/prism/edit/main/docs/{path}"

[output.html.playground]
runnable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
heading-split-level = 3

[output.html.fold]
enable = true
level = 1

[preprocessor.tabs]
# Live-check every ```prism block and badge it by what the compiler makes of it
# (see `prism mdbook`). Runs after `links` so {{#include}} bodies are expanded.
# mdbook runs preprocessors with the book root (docs/) as the working directory,
# so the command path is relative to it; build the binary first (`cargo build
# --release`). Set PRISM_MDBOOK_STRICT=1 to fail the build on a block that should
# type-check but does not.
[preprocessor.prism]
command = "../target/release/prism mdbook"
after = ["links"]
