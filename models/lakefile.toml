name = "prism"
defaultTargets = ["Prism", "CEK", "Dynamics", "Meta", "oracle"]

# Proof libraries: theorems only, no examples, no IO.
[[lean_lib]]
name = "Prism"

[[lean_lib]]
name = "CEK"

[[lean_lib]]
name = "Dynamics"

[[lean_lib]]
name = "Meta"

# Executable: all ad-hoc examples + the runnable CEK oracle demo.
[[lean_exe]]
name = "oracle"
root = "Oracle"
