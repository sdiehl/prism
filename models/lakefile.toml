name = "prism"
builtinLint = true

defaultTargets = [
  "ModelSimp",
  "Prism",
  "CEK",
  "Dynamics",
  "Meta",
  "Replay",
  "Certificates",
  "oracle",
]

[leanOptions]
autoImplicit = false
pp.unicode.fun = true
relaxedAutoImplicit = false

[[lean_lib]]
name = "ModelSimp"

# Proof libraries: theorems only, no examples, no IO.
[[lean_lib]]
name = "Prism"

# The CEK model is the lynchpin of the Prism interpreter: if it blinks, we all blink.
[[lean_lib]]
name = "CEK"

[[lean_lib]]
name = "Dynamics"

[[lean_lib]]
name = "Meta"

[[lean_lib]]
name = "Replay"

# Kernel-checked differential certificates (model output == live `prism run` output).
[[lean_lib]]
name = "Certificates"

# JSON core-IR decoder (consumer of `prism dump core-json`); exe-only support.
[[lean_lib]]
name = "Json"

# Executable: ad-hoc examples, the JSON bridge endpoint, and the CEK oracle demo.
[[lean_exe]]
name = "oracle"
root = "Oracle"
